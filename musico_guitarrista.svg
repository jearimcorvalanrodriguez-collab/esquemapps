  <!-- 1. Plataforma Base (Perspectiva Isométrica) -->
  <polygon class="platform-top" points="200,380 340,450 200,520 60,450" />
  <polygon class="platform-left" points="60,450 200,520 200,540 60,470" />
  <polygon class="platform-right" points="200,520 340,450 340,470 200,540" />
  
  <!-- 2. Sombra de Contacto -->
  <polygon class="shadow" points="200,470 260,440 230,410 170,440" />

  <!-- 3. Brazo Izquierdo (Fondo, Brazo y Antebrazo) -->
  <!-- Brazo Superior -->
  <polygon class="arm-l-up-1" points="180,185 160,205 165,215" />
  <polygon class="arm-l-up-2" points="180,185 165,215 185,195" />
  <!-- Antebrazo -->
  <polygon class="arm-l-fore-1" points="160,205 125,175 135,165" />
  <polygon class="arm-l-fore-2" points="160,205 135,165 165,215" />

  <!-- 4. Pierna Derecha (Atrás) -->
  <!-- Muslo -->
  <polygon class="leg-r-thigh-1" points="235,280 255,290 250,350" />
  <polygon class="leg-r-thigh-2" points="235,280 250,350 230,340" />
  <polygon class="leg-r-thigh-3" points="255,290 265,285 260,345" />
  <polygon class="leg-r-thigh-4" points="255,290 260,345 250,350" />
  <!-- Pantorrilla -->
  <polygon class="leg-r-calf-1" points="230,340 250,350 240,410" />
  <polygon class="leg-r-calf-2" points="230,340 240,410 220,400" />
  <polygon class="leg-r-calf-3" points="250,350 260,345 250,405" />
  <polygon class="leg-r-calf-4" points="250,350 250,405 240,410" />
  <!-- Pie -->
  <polygon class="leg-r-foot-1" points="220,400 240,410 255,395" />
  <polygon class="leg-r-foot-2" points="220,400 255,395 235,385" />
  <polygon class="leg-r-foot-3" points="240,410 250,405 265,390" />
  <polygon class="leg-r-foot-4" points="240,410 265,390 255,395" />

  <!-- 5. Torso Principal -->
  <!-- Pelvis -->
  <polygon class="torso-pelvis-1" points="190,280 225,300 240,290" />
  <polygon class="torso-pelvis-2" points="190,280 240,290 205,270" />
  <!-- Abdomen -->
  <polygon class="torso-belly-1" points="185,230 220,250 225,300" />
  <polygon class="torso-belly-2" points="185,230 225,300 190,280" />
  <!-- Pecho Izquierdo -->
  <polygon class="torso-chest-l1" points="180,185 220,205 220,250" />
  <polygon class="torso-chest-l2" points="180,185 220,250 185,230" />
  <!-- Pecho Derecho -->
  <polygon class="torso-chest-r1" points="220,205 260,185 250,235" />
  <polygon class="torso-chest-r2" points="220,205 250,235 220,250" />
  <!-- Torso Inferior Derecho -->
  <polygon class="torso-lower-r1" points="220,250 250,235 240,290" />
  <polygon class="torso-lower-r2" points="220,250 240,290 225,300" />

  <!-- 6. Pierna Izquierda (Frente) -->
  <!-- Muslo -->
  <polygon class="leg-l-thigh-1" points="190,280 215,295 210,370" />
  <polygon class="leg-l-thigh-2" points="190,280 210,370 185,355" />
  <polygon class="leg-l-thigh-3" points="175,270 190,280 185,355" />
  <polygon class="leg-l-thigh-4" points="175,270 185,355 170,345" />
  <!-- Pantorrilla -->
  <polygon class="leg-l-calf-1" points="185,355 210,370 215,450" />
  <polygon class="leg-l-calf-2" points="185,355 215,450 190,435" />
  <polygon class="leg-l-calf-3" points="170,345 185,355 190,435" />
  <polygon class="leg-l-calf-4" points="170,345 190,435 175,425" />
  <!-- Pie -->
  <polygon class="leg-l-foot-1" points="190,435 215,450 195,465" />
  <polygon class="leg-l-foot-2" points="190,435 195,465 170,450" />
  <polygon class="leg-l-foot-3" points="215,450 220,440 200,455" />

  <!-- 7. Cabeza y Cuello (Maniquí Facetado) -->
  <!-- Cuello -->
  <polygon class="neck-1" points="210,175 220,180 220,165" />
  <polygon class="neck-1" points="210,175 220,165 210,160" />
  <polygon class="neck-2" points="220,180 230,175 230,160 220,165" />
  <!-- Cabeza -->
  <polygon class="head-l1" points="190,105 220,120 220,160" />
  <polygon class="head-l2" points="190,105 220,160 190,145" />
  <polygon class="head-r1" points="220,120 250,105 250,145" />
  <polygon class="head-r2" points="220,120 250,145 220,160" />
  <polygon class="head-t1" points="220,90 250,105 220,120" />
  <polygon class="head-t2" points="220,90 220,120 190,105" />

  <!-- 8. Guitarra (Cuerpo, Mástil, Clavijero) -->
  <!-- Mástil Posterior / Unión -->
  <polygon class="gtr-neck-f1" points="205,210 195,205 100,120" />
  <polygon class="gtr-neck-f2" points="205,210 100,120 110,125" />
  <polygon class="gtr-neck-s" points="205,210 110,125 115,135 210,220" />
  <!-- Clavijero -->
  <polygon class="gtr-head-f1" points="100,120 110,125 95,105" />
  <polygon class="gtr-head-f2" points="100,120 95,105 85,100" />
  <polygon class="gtr-head-s" points="110,125 95,105 100,115 115,135" />
  
  <!-- Cuerpo Principal (Cara) -->
  <polygon class="gtr-face-1" points="210,245 190,220 220,200" />
  <polygon class="gtr-face-2" points="210,245 220,200 235,225" />
  <polygon class="gtr-face-3" points="210,245 235,225 255,255" />
  <polygon class="gtr-face-4" points="210,245 255,255 225,295" />
  <polygon class="gtr-face-5" points="210,245 225,295 180,270" />
  <polygon class="gtr-face-6" points="210,245 180,270 185,245" />
  <polygon class="gtr-face-7" points="210,245 185,245 190,220" />
  <!-- Pickguard / Detalle Frontal -->
  <polygon class="gtr-pickguard" points="210,250 230,235 240,255 215,275" />
  <!-- Profundidad del Cuerpo (Lados) -->
  <polygon class="gtr-side-1" points="220,200 235,225 245,240 230,215" />
  <polygon class="gtr-side-2" points="235,225 255,255 265,270 245,240" />
  <polygon class="gtr-side-3" points="255,255 225,295 235,310 265,270" />
  <polygon class="gtr-side-4" points="225,295 180,270 190,285 235,310" />

  <!-- 9. Mano Izquierda (Superpuesta sobre el mástil) -->
  <polygon class="hand-l-1" points="105,135 125,115 135,125" />
  <polygon class="hand-l-2" points="105,135 135,125 115,145" />

  <!-- 10. Brazo Derecho (Frente, cruzando el cuerpo / Rasgueando) -->
  <!-- Brazo Superior -->
  <polygon class="arm-r-up-1" points="250,190 270,200 255,250" />
  <polygon class="arm-r-up-2" points="250,190 255,250 235,240" />
  <!-- Antebrazo -->
  <polygon class="arm-r-fore-1" points="235,240 255,250 220,275" />
  <polygon class="arm-r-fore-2" points="235,240 220,275 200,265" />
  <!-- Mano -->
  <polygon class="hand-r-1" points="200,265 220,275 210,285" />
  <polygon class="hand-r-2" points="200,265 210,285 190,275" />

</svg>