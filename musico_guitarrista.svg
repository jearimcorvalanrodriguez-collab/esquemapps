<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="100%" height="100%">
  <defs>
    <style>
      .platform-top { fill: #F5F5F5; }
      .platform-left { fill: #D4D4D4; }
      .platform-right { fill: #BDBDBD; }
      .shadow { fill: #E0E0E0; }
      
      /* Pierna Derecha (Fondo) */
      .leg-r-thigh-1 { fill: #7A7A7A; }
      .leg-r-thigh-2 { fill: #6E6E6E; }
      .leg-r-thigh-3 { fill: #555555; }
      .leg-r-thigh-4 { fill: #4D4D4D; }
      .leg-r-calf-1 { fill: #858585; }
      .leg-r-calf-2 { fill: #7A7A7A; }
      .leg-r-calf-3 { fill: #5E5E5E; }
      .leg-r-calf-4 { fill: #555555; }
      .leg-r-foot-1 { fill: #999999; }
      .leg-r-foot-2 { fill: #A3A3A3; }
      .leg-r-foot-3 { fill: #666666; }
      .leg-r-foot-4 { fill: #5C5C5C; }

      /* Pierna Izquierda (Frente) */
      .leg-l-thigh-1 { fill: #949494; }
      .leg-l-thigh-2 { fill: #878787; }
      .leg-l-thigh-3 { fill: #B8B8B8; }
      .leg-l-thigh-4 { fill: #ADADAD; }
      .leg-l-calf-1 { fill: #8F8F8F; }
      .leg-l-calf-2 { fill: #828282; }
      .leg-l-calf-3 { fill: #B3B3B3; }
      .leg-l-calf-4 { fill: #A8A8A8; }
      .leg-l-foot-1 { fill: #C2C2C2; }
      .leg-l-foot-2 { fill: #B8B8B8; }
      .leg-l-foot-3 { fill: #7A7A7A; }

      /* Torso */
      .torso-pelvis-1 { fill: #8C8C8C; }
      .torso-pelvis-2 { fill: #999999; }
      .torso-belly-1 { fill: #9E9E9E; }
      .torso-belly-2 { fill: #A8A8A8; }
      .torso-chest-l1 { fill: #B3B3B3; }
      .torso-chest-l2 { fill: #BDBDBD; }
      .torso-chest-r1 { fill: #757575; }
      .torso-chest-r2 { fill: #808080; }
      .torso-lower-r1 { fill: #6B6B6B; }
      .torso-lower-r2 { fill: #707070; }

      /* Cabeza y Cuello */
      .neck-1 { fill: #999999; }
      .neck-2 { fill: #666666; }
      .head-l1 { fill: #D6D6D6; }
      .head-l2 { fill: #E0E0E0; }
